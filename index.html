<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LonchApp</title>
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1tovbiGsHYnyd6urb9wYv_Sg45TYBtATd">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans selection:bg-blue-100 min-h-screen">

    <!-- Loading Screen -->
    <div id="loading-screen" class="min-h-screen flex items-center justify-center p-4 z-50 fixed inset-0 bg-slate-50">
        <div class="animate-pulse flex flex-col items-center" id="loading-content">
            <div class="w-12 h-12 rounded-full border-4 border-blue-500 border-t-transparent animate-spin mb-4"></div>
            <p class="text-slate-500 font-medium text-lg">Conectando a la base de datos en la nube...</p>
        </div>
    </div>

    <!-- Main Application UI -->
    <div id="app-container" class="hidden relative">
        <!-- Header -->
        <header class="bg-white shadow-sm sticky top-0 z-10">
            <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <button id="btn-back" onclick="window.app.setView('home')" class="hidden p-2 -ml-2 hover:bg-slate-100 rounded-full transition-colors text-slate-600">
                        <i data-lucide="chevron-left" class="w-6 h-6"></i>
                    </button>
                    <div class="flex items-center gap-2">
                                <img src="https://lh3.googleusercontent.com/d/14MLjP5S2pcYTla3sR14wfydSPdbLuxoP" alt="LonchApp" class="h-10 w-auto object-contain">
                            </div>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="main-content" class="max-w-5xl mx-auto p-4 sm:p-6 lg:p-8">
            <!-- Views will be injected here via JavaScript -->
        </main>
        
        <!-- Modal Container -->
        <div id="modal-container"></div>
    </div>

    <!-- Logic Script (Type Module for Firebase) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuración de Firebase del usuario
        const firebaseConfig = {
            apiKey: "AIzaSyDbmTr8iOj03H4ieNKXASLpQNAKiAEcupM",
            authDomain: "tienda-escolar-jmmr.firebaseapp.com",
            projectId: "tienda-escolar-jmmr",
            storageBucket: "tienda-escolar-jmmr.firebasestorage.app",
            messagingSenderId: "771853362864",
            appId: "1:771853362864:web:58d1fbb7c67bce71dabd75"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Path estructurado para guardar toda la aplicación
        const docRef = doc(db, 'artifacts', 'tienda-escolar-jmmr', 'public', 'data', 'tienda_data', 'main');

        // --- CONSTANTES ---
        const ALIMENTOS_BASE = [];
        const BEBIDAS_BASE = [];
        const DIAS_SEMANA = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes'];
        const GRADOS = ['1A', '1B', '2A', '2B', '3A', '3B', '4A', '5A', '6A'];
        
        const MENU_POR_DEFECTO = {
            Lunes: [],
            Martes: [],
            Miércoles: [],
            Jueves: [],
            Viernes: []
        };

        // --- ESTADO GLOBAL ---
        const state = {
            view: 'home', 
            schoolTab: 'pedidos', 
            menuConfigDay: 'Lunes',
            kitchenDay: 'Lunes', 
            kitchenTab: 'pendientes',
            kitchenGradeFilter: 'Todos', 
            kitchenSelectedDelivered: [], 
            
            cycles: [],
            activeCycleId: null, 
            managingCycleId: null,
            managingWeekId: null, 
            reportCycleId: null,
            reportWeekId: null, 
            
            draftMenu: null,
            draftInactiveDays: [], 
            adminData: {
                grades: [], students: {}, alimentos: [], bebidas: [],   
                passwords: {}, contactInfo: { name: '', phone: '' },
                settings: { homeOrderSchedule: { mode: 'always', days: [1,2,3,4,5], start: '07:00', end: '16:00' } }
            },
            adminSelectedGrade: '',
            adminStudentAddMode: 'masivo', 
            editingStudent: null, 
            loggedStudent: null,  
            
            formSelection: { day: null, grade: '', payment: 'Pagado' },
            
            adminSelectedStudents: [],
            adminSelectedAlimentos: [],
            adminSelectedBebidas: [],
            adminStudentSearch: '',
            adminAlimentoSearch: '',
            adminBebidaSearch: '',
            
            adminOrderDay: 'Lunes',
            adminOrderGrade: 'Todos',
            
            adminTab: 'config', // Nueva propiedad para controlar tabs del admin
            
            activeModal: null,
            modalData: {},

            dbConnected: false // Estado de conexión de Firebase
        };

        let cloudData = null; // Mantiene la última copia de la base de datos

        // --- HELPERS ---
        const getActiveCycle = () => state.cycles.find(c => c.id === state.activeCycleId) || state.cycles[0];
        const getManagingCycle = () => state.cycles.find(c => c.id === state.managingCycleId) || getActiveCycle();
        const getActiveWeek = () => { const c = getActiveCycle(); return c ? (c.weeks.find(w => w.id === c.activeWeekId) || c.weeks[0]) : null; };
        const getManagingWeek = () => { const c = getManagingCycle(); return c ? (c.weeks.find(w => w.id === state.managingWeekId) || c.weeks[0]) : null; };

        // --- FIREBASE DATA LAYER ---
        function getFullLocalData() {
            // Retorna una copia profunda del último estado de la nube
            return cloudData ? JSON.parse(JSON.stringify(cloudData)) : null;
        }

        async function saveFullLocalData(data) {
            cloudData = JSON.parse(JSON.stringify(data)); // Optimistic UI Update
            try {
                await setDoc(docRef, data);
            } catch (e) {
                console.error("Error al guardar en Firebase:", e);
                alert("Error de permisos guardando en la nube. Revisa la consola.");
            }
        }

        function hydrateState(data) {
            state.cycles = data.cycles || [];
            state.activeCycleId = data.activeCycleId;
            state.adminData = data.adminData;
            
            const currentActiveCycle = state.cycles.find(c => c.id === state.activeCycleId) || state.cycles[0];
            state.activeWeekId = currentActiveCycle ? currentActiveCycle.activeWeekId : null;
            
            if (!state.adminData.alimentos) state.adminData.alimentos = [];
            if (!state.adminData.bebidas) state.adminData.bebidas = [];
            if (!state.adminData.passwords) state.adminData.passwords = { admin: 'admin', cocina: '', escuela: '' };
            if (!state.adminData.contactInfo) state.adminData.contactInfo = { name: '', phone: '' };
            if (!state.adminData.settings) state.adminData.settings = { homeOrderSchedule: { mode: 'always', days: [1,2,3,4,5], start: '07:00', end: '16:00' } };

            if (!state.activeCycleId || !state.cycles.find(c => c.id === state.activeCycleId)) {
                state.activeCycleId = state.cycles.length > 0 ? state.cycles[0].id : null;
            }
            if (!state.managingCycleId || !state.cycles.find(c => c.id === state.managingCycleId)) {
                state.managingCycleId = state.activeCycleId;
            }
            if (!state.reportCycleId || !state.cycles.find(c => c.id === state.reportCycleId)) {
                state.reportCycleId = state.activeCycleId;
            }
            
            const managingCycle = getManagingCycle();
            if (managingCycle && (!state.managingWeekId || !managingCycle.weeks.find(w => w.id === state.managingWeekId))) {
                state.managingWeekId = managingCycle.activeWeekId || (managingCycle.weeks.length > 0 ? managingCycle.weeks[0].id : null);
            }
            
            const reportCycle = state.cycles.find(c => c.id === state.reportCycleId) || getActiveCycle();
            if (reportCycle && (!state.reportWeekId || !reportCycle.weeks.find(w => w.id === state.reportWeekId))) {
                state.reportWeekId = reportCycle.activeWeekId || (reportCycle.weeks.length > 0 ? reportCycle.weeks[0].id : null);
            }

            const managingWeek = getManagingWeek();
            if (managingWeek) {
                state.draftMenu = JSON.parse(JSON.stringify(managingWeek.menu || MENU_POR_DEFECTO));
                state.draftInactiveDays = [...(managingWeek.inactiveDays || [])]; 
            } else {
                state.draftMenu = JSON.parse(JSON.stringify(MENU_POR_DEFECTO));
                state.draftInactiveDays = [];
            }

            // Ocultar pantalla de carga
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            renderView();
        }

        async function initializeEmptyDB() {
            const newWeek = { id: 'week_' + Date.now(), range: 'Primera Semana', menu: MENU_POR_DEFECTO, orders: [], inactiveDays: [], status: 'active' };
            const newCycle = { id: 'cycle_' + Date.now(), name: 'Ciclo 2025-2026', weeks: [newWeek], activeWeekId: newWeek.id };
            
            const newData = {
                cycles: [newCycle],
                activeCycleId: newCycle.id,
                adminData: {
                    grades: [...GRADOS],
                    students: {},
                    alimentos: [],
                    bebidas: [],
                    passwords: { admin: 'admin', cocina: '', escuela: '' },
                    contactInfo: { name: '', phone: '' },
                    settings: { homeOrderSchedule: { mode: 'always', days: [1,2,3,4,5], start: '07:00', end: '16:00' } }
                }
            };
            
            for(let g of GRADOS) {
                newData.adminData.students[g] = [];
            }

            await saveFullLocalData(newData);
        }

        // --- INICIALIZACIÓN DE FIREBASE ---
        async function initFirebase() {
            const defaultDayIndex = new Date().getDay() - 1;
            const currentDayString = DIAS_SEMANA[defaultDayIndex >= 0 && defaultDayIndex < 5 ? defaultDayIndex : 0];
            state.formSelection.day = currentDayString;
            state.kitchenDay = currentDayString; 

            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        onSnapshot(docRef, (docSnap) => {
                            state.dbConnected = true;
                            if (docSnap.exists()) {
                                cloudData = docSnap.data();
                                hydrateState(cloudData);
                            } else {
                                initializeEmptyDB();
                            }
                        }, (error) => {
                            state.dbConnected = false;
                            console.error("Error al escuchar Firebase:", error);
                            document.getElementById('loading-content').innerHTML = `
                                <div class="bg-white p-8 rounded-3xl shadow-xl max-w-md text-center border border-red-100 fade-in">
                                    <div class="bg-red-100 text-red-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                                    </div>
                                    <h2 class="text-xl font-bold text-slate-900 mb-2">Error de Permisos (Firestore)</h2>
                                    <p class="text-slate-600 text-sm mb-4">No se pudo acceder a la base de datos. Las reglas de seguridad de Firestore están bloqueando el acceso.</p>
                                    <div class="text-left bg-slate-50 p-4 rounded-xl text-sm text-slate-700">
                                        <p class="font-bold mb-1 text-slate-800">Para solucionarlo:</p>
                                        <ol class="list-decimal pl-5 space-y-2 text-slate-600">
                                            <li>Ve a tu consola de Firebase > <b>Firestore Database</b>.</li>
                                            <li>Entra a la pestaña <b>Reglas (Rules)</b>.</li>
                                            <li>Cambia el código a: <br><code class="bg-slate-200 px-2 py-1 rounded text-xs mt-1 block font-mono">match /{document=**} {<br>&nbsp;&nbsp;allow read, write: if true;<br>}</code></li>
                                            <li>Haz clic en <b>Publicar</b> y recarga esta página.</li>
                                        </ol>
                                    </div>
                                </div>
                            `;
                        });
                    }
                });
            } catch (e) {
                console.error("Error Auth:", e);
                document.getElementById('loading-content').innerHTML = `
                    <div class="bg-white p-8 rounded-3xl shadow-xl max-w-md text-center border border-red-100 fade-in">
                        <div class="bg-red-100 text-red-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        </div>
                        <h2 class="text-xl font-bold text-slate-900 mb-2">Configuración Incompleta en Firebase</h2>
                        <p class="text-slate-600 text-sm mb-4">El error <b>${e.code || 'Auth Error'}</b> significa que Firebase Authentication no está habilitado.</p>
                        <div class="text-left bg-slate-50 p-4 rounded-xl text-sm text-slate-700">
                            <p class="font-bold mb-2 text-slate-800">Para solucionarlo:</p>
                            <ol class="list-decimal pl-5 space-y-2 text-slate-600">
                                <li>Ve a tu consola de Firebase.</li>
                                <li>Entra a la sección <b>Authentication</b>.</li>
                                <li>Haz clic en el botón <b>Comenzar (Get Started)</b>.</li>
                                <li>Ve a la pestaña <b>Sign-in method</b>.</li>
                                <li>Habilita el proveedor <b>Anónimo (Anonymous)</b> y guarda.</li>
                                <li>Recarga esta página.</li>
                            </ol>
                        </div>
                    </div>
                `;
            }
        }

        // --- RENDERIZADO PRINCIPAL ---
        function renderView() {
            const container = document.getElementById('main-content');
            const btnBack = document.getElementById('btn-back');
            const modalContainer = document.getElementById('modal-container');
            
            if (state.view === 'home') {
                btnBack.classList.add('hidden');
                container.innerHTML = renderHomeView();
            } else {
                btnBack.classList.remove('hidden');
                if (state.view === 'cocina') container.innerHTML = renderKitchenView();
                if (state.view === 'escuela') container.innerHTML = renderSchoolView();
                if (state.view === 'casa') container.innerHTML = renderParentView();
                if (state.view === 'admin') container.innerHTML = renderAdminView();
                if (state.view === 'login-cocina') container.innerHTML = renderLoginView('cocina', 'Cocina', 'chef-hat', 'emerald');
                if (state.view === 'login-escuela') container.innerHTML = renderLoginView('escuela', 'Gestión Escolar', 'school', 'blue');
                if (state.view === 'login-admin') container.innerHTML = renderLoginView('admin', 'Administración', 'lock', 'slate');
            }
            
            modalContainer.innerHTML = renderActiveModal();
            if ((state.view === 'escuela' && state.schoolTab === 'pedidos') || (state.view === 'casa' && state.loggedStudent)) {
                setTimeout(() => window.app.updateOrderFormUI(state.view === 'escuela' ? 'Escuela' : 'Casa'), 0);
            }
            if(window.lucide) lucide.createIcons();
        }

        // --- VISTAS ---
        function renderHomeView() {
            const activeWeek = getActiveWeek();
            const pendingCount = activeWeek ? activeWeek.orders.filter(o => o.status === 'pendiente').length : 0;
            const badgeHtml = pendingCount > 0 ? `<span class="absolute top-4 right-4 bg-red-500 text-white text-xs font-bold px-3 py-1 rounded-full animate-pulse">${pendingCount} Pendientes</span>` : '';

            // Estado de conexión discreto para Firebase
            const dbStatusHtml = state.dbConnected 
                ? '<span class="text-emerald-500 flex justify-center items-center gap-1"><i data-lucide="cloud-check" class="w-3 h-3"></i> Conectado a Firebase</span>'
                : '<span class="text-amber-500 flex justify-center items-center gap-1"><i data-lucide="cloud-off" class="w-3 h-3 animate-pulse"></i> Conectando...</span>';

            return `
                <div class="max-w-3xl mx-auto fade-in">
                    <div class="text-center mb-10 mt-4">
                        <h1 class="text-5xl font-black text-slate-900 mb-2 tracking-tight">Lonch<span class="text-blue-600">App</span></h1>
                        <h2 class="text-3xl font-bold text-slate-900 mb-3">Selecciona tu perfil</h2>
                        <p class="text-slate-500">Accede a la sección correspondiente para gestionar los pedidos.</p>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <button onclick="window.app.requestAccess('cocina')" class="group relative bg-white p-8 rounded-3xl shadow-sm border border-slate-100 hover:shadow-xl hover:border-emerald-200 transition-all text-center flex flex-col items-center focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2">
                            ${badgeHtml}
                            <div class="bg-emerald-100 text-emerald-600 w-16 h-16 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform"><i data-lucide="chef-hat" class="w-8 h-8"></i></div>
                            <h3 class="text-2xl font-bold group-hover:text-emerald-600 transition-colors">Cocina</h3>
                        </button>
                        <button onclick="window.app.requestAccess('escuela')" class="group bg-white p-8 rounded-3xl shadow-sm border border-slate-100 hover:shadow-xl hover:border-blue-200 transition-all text-center flex flex-col items-center focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                            <div class="bg-blue-100 text-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform"><i data-lucide="school" class="w-8 h-8"></i></div>
                            <h3 class="text-2xl font-bold group-hover:text-blue-600 transition-colors">Escuela</h3>
                        </button>
                        <button onclick="window.app.requestAccess('casa')" class="group bg-white p-8 rounded-3xl shadow-sm border border-slate-100 hover:shadow-xl hover:border-amber-200 transition-all text-center flex flex-col items-center focus:outline-none focus:ring-2 focus:ring-amber-500 focus:ring-offset-2">
                            <div class="bg-amber-100 text-amber-600 w-16 h-16 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform"><i data-lucide="home" class="w-8 h-8"></i></div>
                            <h3 class="text-2xl font-bold group-hover:text-amber-600 transition-colors">Casa</h3>
                        </button>
                    </div>
                    <div class="mt-16 flex flex-col items-center">
                        <button onclick="window.app.requestAccess('admin')" class="inline-flex items-center justify-center gap-2 text-slate-400 hover:text-slate-700 transition-colors text-sm font-medium focus:outline-none">
                            <i data-lucide="settings" class="w-4 h-4"></i> Administración del Sistema
                        </button>
                        <div class="mt-2 text-[10px] font-semibold tracking-wide">
                            ${dbStatusHtml}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderLoginView(section, title, icon, color) {
            const colorBg = { 'emerald': 'bg-emerald-100', 'blue': 'bg-blue-100', 'slate': 'bg-slate-100' };
            const colorText = { 'emerald': 'text-emerald-600', 'blue': 'text-blue-600', 'slate': 'text-slate-600' };
            const colorBtn = { 'emerald': 'bg-emerald-600 hover:bg-emerald-700', 'blue': 'bg-blue-600 hover:bg-blue-700', 'slate': 'bg-slate-900 hover:bg-slate-800' };
            const colorFocus = { 'emerald': 'focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200', 'blue': 'focus:border-blue-500 focus:ring-2 focus:ring-blue-200', 'slate': 'focus:border-slate-500 focus:ring-2 focus:ring-slate-200' };

            return `
                <div class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-50 to-slate-100 fade-in">
                    <div class="bg-white rounded-3xl shadow-2xl p-8 sm:p-12 w-full max-w-md border border-slate-100">
                        <div class="flex justify-center mb-6">
                            <div class="${colorBg[color]} ${colorText[color]} w-20 h-20 rounded-2xl flex items-center justify-center">
                                <i data-lucide="${icon}" class="w-10 h-10"></i>
                            </div>
                        </div>
                        
                        <h1 class="text-3xl font-bold text-slate-900 text-center mb-2">${title}</h1>
                        <p class="text-slate-500 text-center mb-8">Ingresa tu contraseña para continuar</p>
                        
                        <form onsubmit="window.app.validateLogin(event, '${section}')" class="space-y-6">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">Contraseña</label>
                                <input type="password" id="login-password" placeholder="Ingresa la contraseña" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none ${colorFocus[color]} transition-all text-slate-700 font-medium" required autofocus>
                            </div>
                            
                            <button type="submit" class="w-full ${colorBtn[color]} text-white py-3 rounded-xl font-bold text-lg transition-colors shadow-md flex items-center justify-center gap-2">
                                <i data-lucide="lock-open" class="w-5 h-5"></i> Ingresar
                            </button>
                        </form>
                        
                        <button type="button" onclick="window.app.setView('home')" class="w-full mt-4 bg-slate-100 hover:bg-slate-200 text-slate-700 py-3 rounded-xl font-semibold transition-colors flex items-center justify-center gap-2">
                            <i data-lucide="arrow-left" class="w-5 h-5"></i> Volver
                        </button>
                    </div>
                </div>
            `;
        }

        function renderKitchenView() {
            const activeCycle = getActiveCycle();
            const activeWeek = getActiveWeek();
            if (!activeCycle || !activeWeek) return `<div class="p-8 text-center text-red-500 font-bold">Error: No hay un Ciclo o Semana activa configurada.</div>`;

            const filteredByDay = activeWeek.orders.filter(o => o.dayFor === state.kitchenDay);
            const filteredByGrade = state.kitchenGradeFilter === 'Todos' ? filteredByDay : filteredByDay.filter(o => o.grade === state.kitchenGradeFilter);
            const pendOrders = filteredByGrade.filter(o => o.status === 'pendiente');
            const entOrders = filteredByGrade.filter(o => o.status === 'entregado');
            const displayedOrders = state.kitchenTab === 'pendientes' ? pendOrders : entOrders;

            let daysHtml = '';
            DIAS_SEMANA.forEach(d => {
                const isActive = d === state.kitchenDay;
                const btnClass = isActive ? 'bg-emerald-600 text-white shadow-md' : 'bg-slate-50 text-slate-600 hover:bg-slate-100 border border-slate-200';
                daysHtml += `<button onclick="window.app.setKitchenDay('${d}')" class="px-4 py-2 rounded-lg text-sm font-bold transition-colors ${btnClass}">${d}</button>`;
            });

                    summaryTotalsHtml += `<span class="bg-white px-3 py-1 rounded-md text-sm font-bold text-emerald-800 shadow-sm border border-emerald-100">${food}: <span class="text-emerald-600 text-lg ml-1">${count}</span></span>`;
                }
                summaryTotalsHtml += `</div>`;
            }

            let bulkActionsHtml = '';
            if (state.kitchenTab === 'entregados' && entOrders.length > 0) {

            let content = '';
            if (displayedOrders.length === 0) {
                const isPending = state.kitchenTab === 'pendientes';
                content = `
                    <div class="bg-white rounded-3xl p-12 text-center border border-slate-100 shadow-sm col-span-full">

                    const time = new Date(order.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                    } else {
                        actionBtnHtml = `
                            <div class="flex gap-2 mt-2">
                                <button onclick="window.app.undoOrder('${order.id}')" class="flex-grow bg-amber-500 hover:bg-amber-600 text-white py-3 rounded-xl font-semibold transition-colors flex items-center justify-center gap-2 shadow-sm">
                                    <i data-lucide="rotate-ccw" class="w-5 h-5"></i> Quitar
                                </button>

                                </button>
                            </div>

                    let checkboxHtml = '';
                    if (state.kitchenTab === 'entregados') {

                    content += `
                        <div class="bg-white p-5 rounded-2xl shadow-sm border ${state.kitchenTab === 'entregados' ? (state.kitchenSelectedDelivered.includes(order.id) ? 'border-amber-400 bg-amber-50/50' : 'border-emerald-100 bg-emerald-50/30') : 'border-slate-100'} flex flex-col transition-colors">

                                    ${window.app.getPaymentBadge(order.paymentStatus)}

            return `

                                <h2 class="text-2xl font-bold text-slate-900 flex items-center gap-2"><i data-lucide="chef-hat" class="w-6 h-6 text-emerald-500"></i> Monitor de Cocina</h2>

        function renderOrderForm(source, targetWeek = null) {
            const currentDay = state.formSelection.day;
            const currentGrade = source === 'Casa' ? state.loggedStudent.grade : state.formSelection.grade;
            
            const weekData = targetWeek || (source === 'Escuela' ? getManagingWeek() : getActiveWeek());
            if (!weekData) return '';
            
            const isInactiveDay = weekData.inactiveDays && weekData.inactiveDays.includes(currentDay);
            const availableItems = weekData.menu[currentDay] || [];
            const availableFoods = availableItems.filter(i => state.adminData.alimentos.includes(i) || (!state.adminData.alimentos.includes(i) && !state.adminData.bebidas.includes(i))); 
            const availableDrinks = availableItems.filter(i => state.adminData.bebidas.includes(i));

            let daysHtml = '';
            DIAS_SEMANA.forEach(d => {
                const isActive = d === currentDay;
                const btnClass = isActive ? 'bg-blue-50 border-blue-200 text-blue-700' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50';
                daysHtml += `<button type="button" onclick="window.app.updateFormDay('${d}', '${source}')" class="px-4 py-2 rounded-lg text-sm font-medium border transition-colors ${btnClass}">${d}</button>`;
            });

            let studentGradeHtml = '';
            if (source === 'Escuela') {
                let gradesHtml = '';
                state.adminData.grades.forEach(g => {
                    const isActive = g === currentGrade;
                    const btnClass = isActive ? 'bg-indigo-50 border-indigo-300 text-indigo-700 shadow-sm' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50';
                    gradesHtml += `<button type="button" data-grade="${g}" onclick="window.app.onGradeChange('${g}', '${source}')" class="grade-btn px-4 py-2 rounded-lg text-sm font-bold border transition-colors ${btnClass}">${g}</button>`;
                });
                
                studentGradeHtml = `
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Grado y Grupo</label>
                        <div class="flex flex-wrap gap-2" id="grades-container">
                            ${gradesHtml || '<span class="text-sm text-slate-500 italic">No hay grados configurados.</span>'}
                        </div>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mt-6">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Nombre del Alumno</label>
                            <select id="form-student" disabled class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all text-slate-700 disabled:opacity-50 appearance-none" required>
                                <option value="">Primero elige un grado</option>
                            </select>
                        </div>
                `;
                
                const statuses = ['Pagado', 'Fiado', 'Beca', 'Casa'];
                const currentPayment = state.formSelection.payment || 'Pagado';
                let statusButtons = '';
                statuses.forEach(s => {

        window.app = {
            openModal: (modalName) => {
                state.activeModal = modalName;
                renderView();
            },

            closeModal: () => {
                state.activeModal = null;
                renderView();
            },

            submitCreateCycle: (e) => {
                e.preventDefault();
                const name = document.getElementById('modal-cycle-name').value.trim();
                if (!name) return;
                const fullData = getFullLocalData();
                const newCycle = { id: 'cycle_' + Date.now(), name: name, weeks: [], activeWeekId: null };
                fullData.cycles.push(newCycle);
                saveFullLocalData(fullData); loadLocalData();
                state.managingCycleId = newCycle.id;
                state.managingWeekId = null;
                state.draftMenu = JSON.parse(JSON.stringify(MENU_POR_DEFECTO));
                state.draftInactiveDays = [];
                state.activeModal = null;
                renderView();
            },

            submitEditCycle: (e) => {
                e.preventDefault();
                const newName = document.getElementById('modal-cycle-edit-name').value.trim();
                const cycle = state.cycles.find(c => c.id === state.managingCycleId);
                if(!cycle || !newName || newName === cycle.name) return;
                const fullData = getFullLocalData();
                const target = fullData.cycles.find(c => c.id === state.managingCycleId);
                if(target) { 
                    target.name = newName; 
                    saveFullLocalData(fullData); 
                    loadLocalData(); 
                    state.activeModal = null;
                    renderView(); 
                }
            },

            submitCreateWeek: (e) => {
                e.preventDefault();
                const range = document.getElementById('modal-week-range').value.trim();
                if (!range) return;
                const fullData = getFullLocalData();
                const cycle = fullData.cycles.find(c => c.id === state.managingCycleId);
                if(!cycle) return;
                const newWeek = { id: 'week_' + Date.now(), range: range, menu: JSON.parse(JSON.stringify(MENU_POR_DEFECTO)), orders: [], inactiveDays: [], status: 'active' };
                cycle.weeks.push(newWeek);
                if (!cycle.activeWeekId) cycle.activeWeekId = newWeek.id;
                saveFullLocalData(fullData); loadLocalData();
                state.managingWeekId = newWeek.id;
                state.draftMenu = JSON.parse(JSON.stringify(newWeek.menu));
                state.draftInactiveDays = [];
                state.activeModal = null;
                renderView();
            },

            submitEditWeek: (e) => {
                e.preventDefault();
                const newRange = document.getElementById('modal-week-edit-range').value.trim();
                const cycle = getManagingCycle();
                const week = cycle ? cycle.weeks.find(w => w.id === state.managingWeekId) : null;
                if(!week || !newRange || newRange === week.range) return;
                const fullData = getFullLocalData();
                const targetCycle = fullData.cycles.find(c => c.id === state.managingCycleId);
                const targetWeek = targetCycle ? targetCycle.weeks.find(w => w.id === state.managingWeekId) : null;
                if(targetWeek) { 
                    targetWeek.range = newRange; 
                    saveFullLocalData(fullData); 
                    loadLocalData(); 
                    state.activeModal = null;
                    renderView(); 
                }
            },

            checkHomeOrderSchedule: () => {
                const sched = state.adminData?.settings?.homeOrderSchedule;
                if (!sched || sched.mode === 'always') return { open: true };

                const now = new Date();
                const day = now.getDay();
                if (!sched.days.includes(day)) {
                    const daysMap = {0:'Domingo', 1:'Lunes', 2:'Martes', 3:'Miércoles', 4:'Jueves', 5:'Viernes', 6:'Sábado'};
                    const activeDaysNames = sched.days.map(d => daysMap[d]).join(', ');
                    return { open: false, reason: `Días de servicio permitidos: ${activeDaysNames || 'Ninguno'}.` };
                }

                const currentStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
                if (currentStr >= sched.start && currentStr <= sched.end) {
                    return { open: true };
                }
                
                const formatTime = (timeStr) => {
                    if(!timeStr) return '';
                    let [h, m] = timeStr.split(':'); 
                    h = parseInt(h); 
                    const ampm = h >= 12 ? 'p.m.' : 'a.m.'; 
                    h = h % 12 || 12; 
                    return `${h}:${m} ${ampm}`;
                };

                return { open: false, reason: `El horario de atención para pedidos es de ${formatTime(sched.start)} a ${formatTime(sched.end)}.` };
            },

            updateScheduleMode: (mode) => {
                if(!state.adminData.settings) state.adminData.settings = { homeOrderSchedule: { mode: 'always', days: [1,2,3,4,5], start: '07:00', end: '16:00' } };
                state.adminData.settings.homeOrderSchedule.mode = mode;
                const fullData = getFullLocalData(); fullData.adminData = state.adminData; saveFullLocalData(fullData);
                renderView();
            },

            toggleScheduleDay: (day) => {
                if(!state.adminData.settings) return;
                let days = state.adminData.settings.homeOrderSchedule.days;
                if (days.includes(day)) { days = days.filter(d => d !== day); } else { days.push(day); }
                state.adminData.settings.homeOrderSchedule.days = days;
                const fullData = getFullLocalData(); fullData.adminData = state.adminData; saveFullLocalData(fullData);
            },

            saveScheduleTime: () => {
                if(!state.adminData.settings) return;
                state.adminData.settings.homeOrderSchedule.start = document.getElementById('sched_start').value;
                state.adminData.settings.homeOrderSchedule.end = document.getElementById('sched_end').value;
                const fullData = getFullLocalData(); fullData.adminData = state.adminData; saveFullLocalData(fullData);
            },

            requestAccess: (targetView) => {
                if(targetView !== 'home' && targetView !== 'casa') {
                    const requiredPwd = state.adminData.passwords[targetView];
                    if (requiredPwd && requiredPwd.trim() !== '') {
                        state.pendingLoginView = targetView;
                        window.app.setView(`login-${targetView}`);
                        return;
                    }

            validateLogin: (e, section) => {
                e.preventDefault();
                const pwd = document.getElementById('login-password').value.trim();
                const requiredPwd = state.adminData.passwords[section];
                
                if (pwd === requiredPwd) {
                    state.pendingLoginView = null;
                    window.app.setView(section);
                } else {
                    alert("❌ Contraseña incorrecta. Intenta de nuevo.");
                    document.getElementById('login-password').value = '';
                    document.getElementById('login-password').focus();
                }
            },

            setView: (view) => {
                state.view = view;
                state.formSelection.grade = ''; 
                renderView();
            },
            
            loginCasa: (e) => {
                e.preventDefault();
                const pwd = document.getElementById('casa-login-pwd').value.trim();
                let foundStudent = null;
                let foundGrade = null;
                
                for (let grade in state.adminData.students) {
                    const stu = state.adminData.students[grade].find(s => s.password === pwd && pwd !== '');
                    if (stu) {
                        foundStudent = stu;
                        foundGrade = grade;
                        break;
                    }
                }

                if (foundStudent) {
                    if (foundStudent.isBlocked) {
                        alert('🚫 Tu acceso para pedidos desde casa está suspendido temporalmente. Los pedidos ahora solo se pueden realizar directamente en la escuela.');
                        return;
                    }
                    state.loggedStudent = { ...foundStudent, grade: foundGrade };
                    state.formSelection.grade = foundGrade;
                    renderView();
                } else {
                    alert('Clave incorrecta o alumno no encontrado. Verifica los 10 dígitos o pide al maestro que actualice la contraseña.');
                }
            },

                state.loggedStudent = null;

                if(!confirm("¿Estás seguro de eliminar esta semana y TODOS sus pedidos?")) return;

            makeWeekActive: (weekId) => {
                if(!confirm("¿Deseas activar esta semana? Publicará este menú a los padres y reiniciará el monitor de la cocina.")) return;
                const fullData = getFullLocalData();
                const cycle = fullData.cycles.find(c => c.id === state.managingCycleId);
                
                if (fullData.activeCycleId !== cycle.id) {
                    if(!confirm("Este ciclo no es el activo actualmente. ¿Deseas hacer que todo el ciclo se vuelva activo también?")) return;
                    fullData.activeCycleId = cycle.id;
                }

                const currentActive = cycle.weeks.find(w => w.id === cycle.activeWeekId);
                if (currentActive) {
                    currentActive.status = 'archived';
                    currentActive.summaryData = { total: currentActive.orders.length, delivered: currentActive.orders.filter(o=>o.status==='entregado').length, pending: currentActive.orders.filter(o=>o.status==='pendiente').length };
                }
                const targetWeek = cycle.weeks.find(w => w.id === weekId);
                if (targetWeek) { targetWeek.status = 'active'; cycle.activeWeekId = weekId; }
                saveFullLocalData(fullData); loadLocalData(); renderView();
            },

                if (isInactive) {
                    if (!state.draftInactiveDays.includes(day)) state.draftInactiveDays.push(day);

                } else {

            editOrder: (orderId, source) => {
                const fullData = getFullLocalData();
                const cycleId = source === 'Escuela' ? state.managingCycleId : (source === 'Admin' ? state.reportCycleId : state.activeCycleId);
                const weekId = source === 'Escuela' ? state.managingWeekId : (source === 'Admin' ? state.reportWeekId : getActiveWeek()?.id); 
                const cycle = fullData.cycles.find(c => c.id === cycleId);
                const week = cycle?.weeks.find(w => w.id === weekId);
                
                if (week) {
                    const orderIndex = week.orders.findIndex(o => o.id === orderId);
                    if(orderIndex > -1) {
                        const o = week.orders[orderIndex];
                        
                        state.formSelection.day = o.dayFor;
                        state.formSelection.grade = o.grade;
                        state.formSelection.payment = o.paymentStatus || 'Pagado';
                        
                        week.orders.splice(orderIndex, 1);
                        saveFullLocalData(fullData);
                        loadLocalData();

                        if (source === 'Admin') {
                            state.view = 'escuela';
                            state.schoolTab = 'pedidos';
                            state.managingCycleId = cycleId;
                            state.managingWeekId = weekId;
                        }

                        renderView(); 
                        alert(`El pedido de ${o.studentName} ha sido devuelto al formulario de Escuela para su edición.`);
                        
                        setTimeout(() => {
                            const studentSelect = document.getElementById('form-student');
                            if(studentSelect) studentSelect.value = o.studentName;
                            
                            const fRadios = document.getElementsByName('foodSelection');
                            for(let r of fRadios) { if(o.breakfastType.includes(r.value)) { r.checked = true; window.app.selectFood(r); } }
                            const dRadios = document.getElementsByName('drinkSelection');
                            for(let r of dRadios) { if(o.breakfastType.includes(r.value)) { r.checked = true; window.app.selectFood(r); } }
                        }, 100);
                    }
                }
            },

            deleteOrder: (orderId, source) => {
                if(!confirm("¿Estás seguro de que deseas eliminar este pedido por completo?")) return;
                const fullData = getFullLocalData();
                const cycleId = source === 'Escuela' ? state.managingCycleId : (source === 'Admin' ? state.reportCycleId : state.activeCycleId);
                const weekId = source === 'Escuela' ? state.managingWeekId : (source === 'Admin' ? state.reportWeekId : getActiveWeek()?.id); 
                const cycle = fullData.cycles.find(c => c.id === cycleId);
                const week = cycle?.weeks.find(w => w.id === weekId);

                if (week) {
                    week.orders = week.orders.filter(o => o.id !== orderId);
                    saveFullLocalData(fullData); loadLocalData(); renderView();
                }
            },

            updateFormDay: (day, source) => {
                state.formSelection.day = day;
                renderView(); 
            },

            onGradeChange: (grade, source) => {
                state.formSelection.grade = grade;
                document.querySelectorAll('.grade-btn').forEach(btn => {
                    if(btn.dataset.grade === grade) btn.className = 'grade-btn px-4 py-2 rounded-lg text-sm font-bold border transition-colors bg-indigo-50 border-indigo-300 text-indigo-700 shadow-sm';
                    else btn.className = 'grade-btn px-4 py-2 rounded-lg text-sm font-bold border transition-colors bg-white border-slate-200 text-slate-600 hover:bg-slate-50';

                state.formSelection.payment = status;
                document.querySelectorAll('.payment-btn').forEach(btn => {
                    if(btn.dataset.status === status) btn.className = 'payment-btn px-4 py-2 rounded-lg text-sm font-bold border transition-colors bg-emerald-50 border-emerald-300 text-emerald-700 shadow-sm';
                    else btn.className = 'payment-btn px-4 py-2 rounded-lg text-sm font-bold border transition-colors bg-white border-slate-200 text-slate-600 hover:bg-slate-50';

            selectFood: (radioBtn) => {
                document.querySelectorAll(`input[name="${radioBtn.name}"]`).forEach(el => {
                    el.parentElement.classList.remove('border-blue-500', 'bg-blue-50');
                    el.parentElement.classList.add('border-slate-200');
                });
                radioBtn.parentElement.classList.remove('border-slate-200');
                radioBtn.parentElement.classList.add('border-blue-500', 'bg-blue-50');
                document.getElementById('btn-submit').disabled = false;
            },

            submitOrder: (e, source) => {
                e.preventDefault();

                const dayFor = document.getElementById('form-day').value;
                const grade = source === 'Casa' ? state.loggedStudent.grade : state.formSelection.grade;
                const studentName = source === 'Casa' ? state.loggedStudent.name : document.getElementById('form-student').value;
                
                const foodRadio = document.querySelector('input[name="foodSelection"]:checked');
                const drinkRadio = document.querySelector('input[name="drinkSelection"]:checked');
                const paymentStatus = source === 'Casa' ? 'Casa' : (state.formSelection.payment || 'Pagado');
                
                const fullData = getFullLocalData();
                const targetCycleId = source === 'Escuela' ? state.managingCycleId : state.activeCycleId;
                const targetWeekId = source === 'Escuela' ? state.managingWeekId : getActiveWeek()?.id; 
                const targetCycle = fullData.cycles.find(c => c.id === targetCycleId);
                const targetWeek = targetCycle?.weeks.find(w => w.id === targetWeekId);

                if (targetWeek && targetWeek.inactiveDays && targetWeek.inactiveDays.includes(dayFor)) {
                    alert("No se pueden realizar pedidos en un día inhábil.");
                    return;
                }
                
                if (!grade || !studentName || (!foodRadio && !drinkRadio)) {
                    alert("Por favor completa los datos y selecciona al menos un alimento o bebida.");
                    return;
                }

                const breakfastType = [foodRadio?.value, drinkRadio?.value].filter(Boolean).join(' + ');

                const orderData = {
                    id: 'ord_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                    source, dayFor, grade, studentName,
                    breakfastType: breakfastType, paymentStatus: paymentStatus, 
                    status: 'pendiente', timestamp: Date.now()
                };

                if (targetWeek) {
                    targetWeek.orders.push(orderData);
                    saveFullLocalData(fullData); loadLocalData();
                    state.formSelection.grade = source === 'Casa' ? '' : grade; 
                    state.formSelection.payment = 'Pagado';
                    alert("¡Pedido guardado con éxito!");
                    renderView();
                } else {
                    alert("Error interno: No se pudo localizar la semana activa para guardar el pedido.");
                }
            },

            completeOrder: (orderId) => {
                const fullData = getFullLocalData();
                const cycle = fullData.cycles.find(c => c.id === fullData.activeCycleId);
                const activeWeek = cycle?.weeks.find(w => w.id === cycle.activeWeekId);
                if (activeWeek) {
                    const orderIndex = activeWeek.orders.findIndex(o => o.id === orderId);
                    if (orderIndex > -1) {
                        activeWeek.orders[orderIndex].status = 'entregado';
                        activeWeek.orders[orderIndex].completedAt = Date.now();
                        saveFullLocalData(fullData); loadLocalData(); renderView();
                    }
                }
            },

            undoOrder: (orderId) => {
                const fullData = getFullLocalData();
                const cycle = fullData.cycles.find(c => c.id === fullData.activeCycleId);
                const activeWeek = cycle?.weeks.find(w => w.id === cycle.activeWeekId);
                if (activeWeek) {
                    const orderIndex = activeWeek.orders.findIndex(o => o.id === orderId);
                    if (orderIndex > -1) {
                        activeWeek.orders[orderIndex].status = 'pendiente';
                        activeWeek.orders[orderIndex].completedAt = null;
                        
                        const sIdx = state.kitchenSelectedDelivered.indexOf(orderId);
                        if(sIdx > -1) state.kitchenSelectedDelivered.splice(sIdx, 1);

                        saveFullLocalData(fullData); loadLocalData(); renderView();
                    }
                }
            },

            deleteOrderPermanently: (orderId) => {
                if(!confirm("¿Eliminar este pedido definitivamente? No podrá ser recuperado.")) return;
                const fullData = getFullLocalData();
                const cycle = fullData.cycles.find(c => c.id === fullData.activeCycleId);
                const activeWeek = cycle?.weeks.find(w => w.id === cycle.activeWeekId);
                if (activeWeek) {
                    activeWeek.orders = activeWeek.orders.filter(o => o.id !== orderId);
                    const sIdx = state.kitchenSelectedDelivered.indexOf(orderId);
                    if(sIdx > -1) state.kitchenSelectedDelivered.splice(sIdx, 1);
                    saveFullLocalData(fullData); loadLocalData(); renderView();
                }
            },

            toggleKitchenDelivered: (orderId) => {
                const idx = state.kitchenSelectedDelivered.indexOf(orderId);
                if(idx > -1) state.kitchenSelectedDelivered.splice(idx, 1);
                else state.kitchenSelectedDelivered.push(orderId);
                renderView();
            },

            toggleAllKitchenDelivered: (checked) => {
                if(checked) {
                    const activeWeek = getActiveWeek();
                    if(activeWeek) {
                        const entOrders = activeWeek.orders.filter(o => o.dayFor === state.kitchenDay && o.status === 'entregado');
                        if (state.kitchenGradeFilter !== 'Todos') {
                            state.kitchenSelectedDelivered = entOrders.filter(o => o.grade === state.kitchenGradeFilter).map(o => o.id);
                        } else {
                            state.kitchenSelectedDelivered = entOrders.map(o => o.id);
                        }
                    }
                } else {
                    state.kitchenSelectedDelivered = [];
                }
                renderView();
            },

            deleteSelectedKitchenDelivered: () => {
                if(!confirm(`¿Eliminar definitivamente ${state.kitchenSelectedDelivered.length} pedido(s)? No podrán ser recuperados.`)) return;
                const fullData = getFullLocalData();
                const cycle = fullData.cycles.find(c => c.id === fullData.activeCycleId);
                const activeWeek = cycle?.weeks.find(w => w.id === cycle.activeWeekId);
                if (activeWeek) {
                    activeWeek.orders = activeWeek.orders.filter(o => !state.kitchenSelectedDelivered.includes(o.id));
                    saveFullLocalData(fullData); 
                    state.kitchenSelectedDelivered = [];
                    loadLocalData(); 
                    renderView();
                }
            },

            setSearch: (type, val) => {
                if (type === 'student') state.adminStudentSearch = val;
                else if (type === 'alimento') state.adminAlimentoSearch = val;
                else if (type === 'bebida') state.adminBebidaSearch = val;
                renderView();
                setTimeout(() => {
                    const input = document.querySelector(`input[placeholder="Buscar ${type}..."]`);
                    if(input) { input.focus(); input.selectionStart = input.selectionEnd = input.value.length; }
                }, 0);
            },

            adminSelectGrade: (grade) => {
                state.adminSelectedGrade = grade;
                state.adminSelectedStudents = []; 
                state.adminStudentSearch = ''; 
                renderView();
            },
            
            setStudentAddMode: (mode) => {
                state.adminStudentAddMode = mode;
                renderView();
            },

            toggleAllStudents: (checked) => {
                if (!state.adminSelectedGrade) return;
                const students = state.adminData.students[state.adminSelectedGrade] || [];
                const searchQuery = (state.adminStudentSearch || '').toLowerCase();
                const filteredStudents = students.filter(s => s.name.toLowerCase().includes(searchQuery) || (s.curp && s.curp.toLowerCase().includes(searchQuery)));
                
                if (checked) {
                    filteredStudents.forEach(s => {
                        if (!state.adminSelectedStudents.includes(s.id)) state.adminSelectedStudents.push(s.id);
                    });
                } else {
                    state.adminSelectedStudents = state.adminSelectedStudents.filter(id => !filteredStudents.find(s=>s.id === id));
                }
                renderView();
            },

            toggleStudentBlock: (studentId) => {
                let found = false;
                const fullData = getFullLocalData();
                for (let g in state.adminData.students) {
                    const idx = state.adminData.students[g].findIndex(s => s.id === studentId);
                    if (idx > -1) {
                        state.adminData.students[g][idx].isBlocked = !state.adminData.students[g][idx].isBlocked;
                        found = true;
                        break;
                    }
                }
                if (found) {
                    fullData.adminData = state.adminData;
                    saveFullLocalData(fullData);
                    renderView();
                }
            },

            toggleStudentSelect: (studentId) => {
                const idx = state.adminSelectedStudents.indexOf(studentId);
                if (idx > -1) state.adminSelectedStudents.splice(idx, 1);
                else state.adminSelectedStudents.push(studentId);
                renderView();
            },

            deleteSelectedStudents: () => {
                if (!confirm(`¿Estás seguro de eliminar ${state.adminSelectedStudents.length} alumno(s)?`)) return;
                const fullData = getFullLocalData();
                state.adminData.students[state.adminSelectedGrade] = state.adminData.students[state.adminSelectedGrade].filter(item => !state.adminSelectedStudents.includes(item.id));
                fullData.adminData = state.adminData;
                saveFullLocalData(fullData);
                state.adminSelectedStudents = []; 
                loadLocalData(); renderView();
            },

            openEditStudentModal: (studentId) => {
                let found = null;
                for(let g in state.adminData.students) {
                    const s = state.adminData.students[g].find(x => x.id === studentId);
                    if(s) { found = { ...s, grade: g }; break; }
                }
                if(found) {
                    state.editingStudent = found;
                    renderView();
                }
            },

            closeEditStudentModal: () => {
                state.editingStudent = null;
                renderView();
            },

            saveEditedStudent: (e) => {
                e.preventDefault();
                if(!state.editingStudent) return;
                
                const newName = document.getElementById('edit-stu-name').value.trim();
                const newCurp = document.getElementById('edit-stu-curp').value.trim().toUpperCase();
                const newPwd = document.getElementById('edit-stu-pwd').value.trim();
                
                if(!newName || !newPwd) return alert("Nombre y contraseña son obligatorios.");
                
                const fullData = getFullLocalData();
                const g = state.editingStudent.grade;
                const idx = state.adminData.students[g].findIndex(x => x.id === state.editingStudent.id);
                
                if(idx > -1) {
                    state.adminData.students[g][idx].name = newName;
                    state.adminData.students[g][idx].curp = newCurp;
                    state.adminData.students[g][idx].password = newPwd;
                    
                    fullData.adminData = state.adminData;
                    saveFullLocalData(fullData);
                    loadLocalData();
                    state.editingStudent = null;
                    renderView();
                }
            },

            addAdminItem: (e, type) => {
                e.preventDefault();
                const fullData = getFullLocalData();
                let needsSave = false;

                if (type === 'grade') {
                    const input = document.getElementById('new-grade-input');
                    const val = input.value.trim();
                    if (val && !state.adminData.grades.includes(val)) {
                        state.adminData.grades.push(val);
                        if (!state.adminData.students[val]) state.adminData.students[val] = [];
                        needsSave = true;
                    }
                } 
                else if (type === 'student') {
                    const input = document.getElementById('new-student-input');
                    const rawVal = input.value;
                    const lines = rawVal.split(/[\n]+/).map(i => i.trim()).filter(i => i !== '');
                    
                    if (lines.length > 0 && state.adminSelectedGrade) {
                        if (!state.adminData.students[state.adminSelectedGrade]) state.adminData.students[state.adminSelectedGrade] = [];
                        
                        lines.forEach(line => {
                            const curpMatch = line.match(/^([A-Z0-9]{18})\s+(.*)$/i);
                            let newStudent = null;

                            if (curpMatch) {
                                const curp = curpMatch[1].toUpperCase();
                                const rest = curpMatch[2];
                                let apPaterno = '', apMaterno = '', nombres = '';
                                
                                const slashIdx = rest.indexOf('/');
                                const starIdx = rest.indexOf('*');
                                
                                if (slashIdx > -1 && starIdx > slashIdx) {
                                    apPaterno = rest.substring(0, slashIdx).trim();
                                    apMaterno = rest.substring(slashIdx + 1, starIdx).trim();
                                    nombres = rest.substring(starIdx + 1).trim();
                                    const fullName = `${nombres} ${apPaterno} ${apMaterno}`.trim().replace(/\s+/g, ' ');
                                    
                                    newStudent = {
                                        id: 'stu_' + Date.now() + Math.random().toString(36).substr(2, 5),
                                        name: fullName, curp: curp, password: curp.substring(0, 10), isBlocked: false
                                    };
                                } else {
                                    newStudent = { id: 'stu_' + Date.now() + Math.random().toString(36).substr(2, 5), name: rest, curp: curp, password: curp.substring(0, 10), isBlocked: false };
                                }
                            } else {
                                newStudent = { id: 'stu_' + Date.now() + Math.random().toString(36).substr(2, 5), name: line, curp: '', password: '', isBlocked: false };
                            }
                            
                            state.adminData.students[state.adminSelectedGrade].push(newStudent);
                            needsSave = true;
                        });
                    }
                } 
                else if (type === 'alimento' || type === 'bebida') {
                    const inputId = type === 'alimento' ? 'new-alimento-input' : 'new-bebida-input';
                    const input = document.getElementById(inputId);
                    const rawVal = input.value;
                    const items = rawVal.split(/[,;\n]+/).map(i => i.trim()).filter(i => i !== '');

                    if (items.length > 0) {
                        items.forEach(item => {
                            if (type === 'alimento' && !state.adminData.alimentos.includes(item)) {
                                state.adminData.alimentos.push(item); needsSave = true;
                            } else if (type === 'bebida' && !state.adminData.bebidas.includes(item)) {
                                state.adminData.bebidas.push(item); needsSave = true;
                            }
                        });
                    }
                }

                if (needsSave) { fullData.adminData = state.adminData; saveFullLocalData(fullData); loadLocalData(); renderView(); }
            },

            addSingleStudent: (e) => {
                e.preventDefault();
                if(!state.adminSelectedGrade) return;

                const name = document.getElementById('ind-nombre').value.trim();
                const curp = document.getElementById('ind-curp').value.trim().toUpperCase();
                const pwd = document.getElementById('ind-pwd').value.trim();

                if(!name || !pwd) return;

                const newStudent = { id: 'stu_' + Date.now() + Math.random().toString(36).substr(2, 5), name: name, curp: curp, password: pwd, isBlocked: false };

                const fullData = getFullLocalData();
                if (!state.adminData.students[state.adminSelectedGrade]) state.adminData.students[state.adminSelectedGrade] = [];
                state.adminData.students[state.adminSelectedGrade].push(newStudent);
                
                fullData.adminData = state.adminData;
                saveFullLocalData(fullData); loadLocalData(); renderView();
            },

            toggleAllCatalog: (catalogType, checked) => {
                const isAlimentos = catalogType === 'alimentos';
                const sourceArray = isAlimentos ? state.adminData.alimentos : state.adminData.bebidas;
                const searchQuery = (isAlimentos ? state.adminAlimentoSearch : state.adminBebidaSearch || '').toLowerCase();
                const filteredItems = sourceArray.filter(c => c.toLowerCase().includes(searchQuery));
                
                if (checked) {
                    filteredItems.forEach(c => {
                        if (isAlimentos && !state.adminSelectedAlimentos.includes(c)) state.adminSelectedAlimentos.push(c);
                        if (!isAlimentos && !state.adminSelectedBebidas.includes(c)) state.adminSelectedBebidas.push(c);
                    });
                } else {
                    if (isAlimentos) state.adminSelectedAlimentos = state.adminSelectedAlimentos.filter(c => !filteredItems.includes(c));
                    else state.adminSelectedBebidas = state.adminSelectedBebidas.filter(c => !filteredItems.includes(c));
                }
                renderView();
            },

            toggleCatalogSelect: (catalogType, item) => {
                const targetArray = catalogType === 'alimentos' ? state.adminSelectedAlimentos : state.adminSelectedBebidas;
                const idx = targetArray.indexOf(item);
                if (idx > -1) targetArray.splice(idx, 1);
                else targetArray.push(item);
                renderView();
            },

            deleteSelectedCatalog: (catalogType) => {
                const targetSelected = catalogType === 'alimentos' ? state.adminSelectedAlimentos : state.adminSelectedBebidas;
                if (!confirm(`¿Estás seguro de eliminar ${targetSelected.length} artículo(s) de todos los menús?`)) return;
                
                const fullData = getFullLocalData();
                targetSelected.forEach(item => {
                    if (catalogType === 'alimentos') state.adminData.alimentos = state.adminData.alimentos.filter(c => c !== item);
                    else state.adminData.bebidas = state.adminData.bebidas.filter(c => c !== item);
                    fullData.cycles.forEach(c => { c.weeks.forEach(w => { DIAS_SEMANA.forEach(d => { if (w.menu[d]) w.menu[d] = w.menu[d].filter(f => f !== item); }); }); });
                });
                
                fullData.adminData = state.adminData; saveFullLocalData(fullData);
                if (catalogType === 'alimentos') state.adminSelectedAlimentos = [];
                else state.adminSelectedBebidas = [];
                loadLocalData(); renderView();
            },

            editAdminItem: (type, oldVal) => {
                if(type === 'student') return; 

                const newVal = prompt("Editar valor:", oldVal);
                if (newVal === null || newVal.trim() === '' || newVal.trim() === oldVal) return; 
                
                const cleanVal = newVal.trim();
                const fullData = getFullLocalData();
                let needsSave = false;

                if (type === 'grade') {
                    const idx = state.adminData.grades.indexOf(oldVal);
                    if (idx > -1) {
                        state.adminData.grades[idx] = cleanVal;
                        state.adminData.students[cleanVal] = state.adminData.students[oldVal] || [];
                        delete state.adminData.students[oldVal];
                        if (state.adminSelectedGrade === oldVal) state.adminSelectedGrade = cleanVal;
                        needsSave = true;
                    }
                } else if (type === 'alimento' || type === 'bebida') {
                    const targetArray = type === 'alimento' ? state.adminData.alimentos : state.adminData.bebidas;
                    const idx = targetArray.indexOf(oldVal);
                    if (idx > -1) {
                        targetArray[idx] = cleanVal;
                        fullData.cycles.forEach(c => { c.weeks.forEach(w => { DIAS_SEMANA.forEach(d => { if (w.menu[d]) { const mIdx = w.menu[d].indexOf(oldVal); if (mIdx > -1) w.menu[d][mIdx] = cleanVal; } }); }); });
                        if (type === 'alimento') { const cIdx = state.adminSelectedAlimentos.indexOf(oldVal); if (cIdx > -1) state.adminSelectedAlimentos[cIdx] = cleanVal; } 
                        else { const cIdx = state.adminSelectedBebidas.indexOf(oldVal); if (cIdx > -1) state.adminSelectedBebidas[cIdx] = cleanVal; }
                        needsSave = true;
                    }
                }

                if (needsSave) { fullData.adminData = state.adminData; saveFullLocalData(fullData); loadLocalData(); renderView(); }
            },

            deleteAdminItem: (type, itemVal) => {
                if (!confirm(`¿Estás seguro de eliminar este elemento?`)) return;
                
                const fullData = getFullLocalData();
                let needsSave = false;

                if (type === 'grade') {
                    state.adminData.grades = state.adminData.grades.filter(g => g !== itemVal);
                    delete state.adminData.students[itemVal];
                    if (state.adminSelectedGrade === itemVal) state.adminSelectedGrade = '';
                    needsSave = true;
                } else if (type === 'student') {
                    if (state.adminSelectedGrade) {
                        state.adminData.students[state.adminSelectedGrade] = state.adminData.students[state.adminSelectedGrade].filter(s => s.id !== itemVal);
                        state.adminSelectedStudents = state.adminSelectedStudents.filter(id => id !== itemVal);
                        needsSave = true;
                    }
                } else if (type === 'alimento' || type === 'bebida') {
                    if (type === 'alimento') {
                        state.adminData.alimentos = state.adminData.alimentos.filter(c => c !== itemVal);
                        state.adminSelectedAlimentos = state.adminSelectedAlimentos.filter(c => c !== itemVal);
                    } else {
                        state.adminData.bebidas = state.adminData.bebidas.filter(c => c !== itemVal);
                        state.adminSelectedBebidas = state.adminSelectedBebidas.filter(c => c !== itemVal);
                    }
                    fullData.cycles.forEach(c => { c.weeks.forEach(w => { DIAS_SEMANA.forEach(d => { if (w.menu[d]) w.menu[d] = w.menu[d].filter(f => f !== itemVal); }); }); });
                    needsSave = true;
                }

                if (needsSave) { fullData.adminData = state.adminData; saveFullLocalData(fullData); loadLocalData(); renderView(); }
            },

            saveContactInfo: (e) => {
                e.preventDefault();
                state.adminData.contactInfo = { 
                    name: document.getElementById('contact-name').value.trim(), 
                    phone: document.getElementById('contact-phone').value.trim() 
                };
                const fullData = getFullLocalData(); fullData.adminData = state.adminData; saveFullLocalData(fullData);
                alert("¡Información de contacto guardada correctamente!");
            },

            savePasswords: (e) => {
                e.preventDefault();
                state.adminData.passwords = { admin: document.getElementById('pwd-admin').value.trim(), cocina: document.getElementById('pwd-cocina').value.trim(), escuela: document.getElementById('pwd-escuela').value.trim() };
                const fullData = getFullLocalData(); fullData.adminData = state.adminData; saveFullLocalData(fullData);
                alert("¡Contraseñas actualizadas correctamente!");
            },

            resetFirebaseData: async () => {
                await initializeEmptyDB();
                alert("¡Datos reiniciados correctamente!");
            }
        };

        // Arrancamos Firebase
        initFirebase();

    </script>
</body>
</html>
